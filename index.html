<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AIGCOOP 프롬프트 BOOK</title>
    
    <!-- 필수 라이브러리 (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compatibility Mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #F8FAFC;
            color: #1e293b;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .zoom-in { animation: zoomIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .prompt-card { 
            transition: all 0.3s ease;
        }
        .prompt-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .icon-wrapper { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            line-height: 0; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================================
        // 🛠️ Firebase 설정 적용 완료
        // ==========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBY0niSiio0iM7MHlI694xcWcANC8PrUiU",
            authDomain: "aigcoop.firebaseapp.com",
            projectId: "aigcoop",
            storageBucket: "aigcoop.firebasestorage.app",
            messagingSenderId: "39164548544",
            appId: "1:39164548544:web:9a1f088e6436b990d46425",
            measurementId: "G-N1NZNKM7PK"
        };

        // Firebase 초기화
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "aigcoop-final-master"; 
        const ADMIN_PASSWORD = "gcoop1234";

        // 초기 예시 데이터
        const SEED_DATA = [
            { title: "네온 사이버펑크 서울", category: "배경/풍경", content: "Vertical cinematic shot, Cyberpunk Seoul street at night, neon signs in Korean characters, rain reflecting on asphalt, 8k, hyper-realistic, 9:16 aspect ratio.", imageUrl: "https://images.unsplash.com/photo-1534239143101-1b1c627395c5?q=80&w=1000&auto=format&fit=crop" },
            { title: "지브리 감성 숲속 도서관", category: "애니메이션", content: "Studio Ghibli art style, a hidden library inside a giant tree, sunbeams, magical atmosphere, warm colors, detailed, 9:16.", imageUrl: "https://images.unsplash.com/photo-1516214626895-051a546ccdf2?q=80&w=1000&auto=format&fit=crop" },
            { title: "럭셔리 골드 향수 광고", category: "광고/홍보", content: "Premium gold perfume bottle on silk fabric, soft studio lighting, elegant shadows, bokeh background, sharp focus, 8k, 9:16.", imageUrl: "https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=1000&auto=format&fit=crop" },
            { title: "우주 탐사대원 프로필", category: "인물/프로필", content: "Portrait of an astronaut in high-tech suit, Mars background, red dust, galaxy reflection in helmet, cinematic lighting, hyper-realistic face, 9:16.", imageUrl: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1000&auto=format&fit=crop" },
            { title: "보그 스타일 패션 모델", category: "인물/프로필", content: "High-end fashion model in desert, white avant-garde dress, sunset lighting, Vogue style, cinematic composition, film texture, 9:16.", imageUrl: "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=1000&auto=format&fit=crop" },
            { title: "구름 위의 판타지 사원", category: "배경/풍경", content: "Ancient temple floating on white clouds, majestic mountains, golden sunset, mystical fog, traditional architecture, masterpiece, 9:16.", imageUrl: "https://images.unsplash.com/photo-1528114039593-4366cc08227d?q=80&w=1000&auto=format&fit=crop" },
            { title: "귀여운 3D 솜사탕 몬스터", category: "애니메이션", content: "Cute fluffy 3D monster, made of pink cotton candy, big expressive eyes, Pixar style, soft lighting, pastel background, hyper-detailed, 9:16.", imageUrl: "https://images.unsplash.com/photo-1550747013-0bcba498a617?q=80&w=1000&auto=format&fit=crop" },
            { title: "스테이크 하우스 홍보 사진", category: "광고/홍보", content: "Vertical food photography, grilled ribeye steak, rosemary, salt crystals, steam rising, moody dark background, professional studio lighting, 8k, 9:16.", imageUrl: "https://images.unsplash.com/photo-1600891964599-f61ba0e24092?q=80&w=1000&auto=format&fit=crop" },
            { title: "황금 갑옷을 입은 여기사", category: "인물/프로필", content: "Epic portrait of a female knight in intricate golden armor, cathedral interior background, dramatic light beams, realistic face, highly detailed, 9:16.", imageUrl: "https://images.unsplash.com/photo-1519074063912-ad2d65f173f7?q=80&w=1000&auto=format&fit=crop" },
            { title: "미래형 해저 도시 전경", category: "배경/풍경", content: "Futuristic underwater city inside glass domes, bioluminescent coral reefs, giant futuristic submarines, deep blue lighting, cinematic concept art, 9:16.", imageUrl: "https://images.unsplash.com/photo-1583212292454-1fe6229603b7?q=80&w=1000&auto=format&fit=crop" }
        ];

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({
                        elements: [i],
                        attrs: { width: size, height: size, class: className, strokeWidth: 2 }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="icon-wrapper"></span>;
        };

        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authError, setAuthError] = useState(null);
            const [dbError, setDbError] = useState(null);
            const [prompts, setPrompts] = useState([]);
            const [categories, setCategories] = useState(["전체", "인물/프로필", "애니메이션", "광고/홍보", "배경/풍경"]);
            const [selectedCategory, setSelectedCategory] = useState("전체");
            const [searchQuery, setSearchQuery] = useState("");
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isAdminAuthModalOpen, setIsAdminAuthModalOpen] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(null);
            const [fullScreenItem, setFullScreenItem] = useState(null);
            
            const [adminInput, setAdminInput] = useState("");
            const [copyStatus, setCopyStatus] = useState(null);
            const [toast, setToast] = useState(null);

            const [newPrompt, setNewPrompt] = useState({ title: "", imageData: null, content: "", category: "인물/프로필" });
            const [isAddingNewCategory, setIsAddingNewCategory] = useState(false);
            const [tempCategory, setTempCategory] = useState("");
            const fileInputRef = useRef(null);

            // 1. 인증 로직
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        setLoading(false);
                    } else {
                        try {
                            await auth.signInAnonymously();
                        } catch (e) {
                            console.error("Auth Error:", e);
                            if (e.code === 'auth/configuration-not-found') {
                                setAuthError("Firebase 인증 설정에서 '익명 로그인'을 활성화해야 합니다.");
                            } else {
                                setAuthError(e.message);
                            }
                            setLoading(false);
                        }
                    }
                });
                return () => unsubscribe();
            }, []);

            // 2. 데이터 실시간 연동
            useEffect(() => {
                if (!user || !db) return;
                const path = `artifacts/${appId}/public/data/prompts`;
                const query = db.collection(path);
                
                const unsub = query.onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setPrompts(data.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
                    
                    // DB에 있는 카테고리들 중 새로운 것이 있다면 리스트 업데이트
                    const dbCategories = [...new Set(data.map(item => item.category))];
                    setCategories(prev => {
                        const next = [...new Set([...prev, ...dbCategories])];
                        return next;
                    });
                    
                    setDbError(null);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    if (err.code === 'not-found') {
                        setDbError("이 프로젝트에 Firestore 데이터베이스가 아직 생성되지 않았습니다.");
                    } else if (err.code === 'permission-denied') {
                        setDbError("Firestore 데이터베이스가 꺼져있거나 접근 권한이 부족합니다.");
                    } else {
                        setDbError(err.message);
                    }
                });
                return () => unsub();
            }, [user]);

            const showToast = (text, type = 'success') => {
                setToast({ text, type });
                setTimeout(() => setToast(null), 2500);
            };

            const handleAdminAuth = (e) => {
                e.preventDefault();
                if (adminInput === ADMIN_PASSWORD) {
                    setIsAdmin(true);
                    setIsAdminAuthModalOpen(false);
                    setAdminInput("");
                    showToast("관리자 모드가 활성화되었습니다.");
                } else { 
                    showToast("비밀번호가 올바르지 않습니다.", "error"); 
                }
            };

            const registerPrompt = async (e) => {
                if (e) e.preventDefault();
                if (!isAdmin || !user) return;
                try {
                    const path = `artifacts/${appId}/public/data/prompts`;
                    await db.collection(path).add({
                        ...newPrompt,
                        imageUrl: newPrompt.imageData || "",
                        createdAt: Date.now(),
                        creatorId: user.uid
                    });
                    setNewPrompt({ title: "", imageData: null, content: "", category: "인물/프로필" });
                    setIsModalOpen(false);
                    showToast("성공적으로 등록되었습니다.");
                } catch (e) { 
                    console.error(e);
                    showToast("등록 실패", "error"); 
                }
            };

            const handleSeedLoad = async () => {
                if (!isAdmin) return;
                try {
                    const path = `artifacts/${appId}/public/data/prompts`;
                    for (const item of SEED_DATA) {
                        await db.collection(path).add({ ...item, createdAt: Date.now(), creatorId: user.uid });
                    }
                    showToast("샘플 프롬프트 로드 완료");
                } catch (e) { showToast("로드 실패", "error"); }
            };

            const handleAddNewCategory = () => {
                const trimmed = tempCategory.trim();
                if (trimmed && !categories.includes(trimmed)) {
                    setCategories(prev => [...prev, trimmed]);
                    setNewPrompt(prev => ({ ...prev, category: trimmed }));
                    setTempCategory("");
                    setIsAddingNewCategory(false);
                    showToast(`'${trimmed}' 분류가 추가되었습니다.`);
                }
            };

            const filteredPrompts = useMemo(() => {
                return prompts.filter(p => {
                    const q = searchQuery.toLowerCase();
                    const c = selectedCategory === "전체" || p.category === selectedCategory;
                    const s = (p.title || "").toLowerCase().includes(q) || (p.content || "").toLowerCase().includes(q);
                    return c && s;
                });
            }, [prompts, selectedCategory, searchQuery]);

            // 에러 안내 컴포넌트
            const ErrorView = ({ title, message, steps, url }) => (
                <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 text-center">
                    <div className="bg-white p-10 rounded-[48px] shadow-2xl max-w-lg w-full border border-slate-100 zoom-in">
                        <Icon name="alert-triangle" size={72} className="text-rose-500 mb-6 mx-auto" />
                        <h1 className="text-2xl font-black text-gray-800 mb-4 tracking-tight">{title}</h1>
                        <div className="text-left bg-slate-50 p-6 rounded-3xl border border-slate-100 mb-8 space-y-4">
                            <p className="text-sm text-gray-600 leading-relaxed font-bold">{message}</p>
                            <div className="text-xs text-indigo-600 font-bold space-y-2">
                                <p>✅ 지금 바로 해결하세요:</p>
                                <ol className="list-decimal ml-4 space-y-2">
                                    {steps.map((step, i) => <li key={i}>{step}</li>)}
                                </ol>
                            </div>
                        </div>
                        <div className="flex flex-col gap-3">
                            <a href={url} target="_blank" className="w-full py-4 bg-indigo-600 text-white rounded-[24px] font-black shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-2">
                                <Icon name="external-link" size={18} /> Firebase 콘솔로 이동
                            </a>
                            <button onClick={() => window.location.reload()} className="w-full py-4 bg-slate-100 text-slate-500 rounded-[24px] font-black text-xs hover:bg-slate-200 transition-colors">설정 완료 후 새로고침</button>
                        </div>
                    </div>
                </div>
            );

            if (authError) return (
                <ErrorView 
                    title="인증 서비스 설정 필요" 
                    message={authError} 
                    steps={["Firebase Console > Authentication 메뉴 진입", "Sign-in method 탭 클릭", "'새 제공업체 추가' 클릭", "익명(Anonymous) 사용 설정 및 저장"]}
                    url="https://console.firebase.google.com/project/aigcoop/authentication/providers"
                />
            );

            if (dbError) return (
                <ErrorView 
                    title="데이터베이스 생성 필요" 
                    message={dbError} 
                    steps={["위 링크를 클릭해 Firebase Console로 이동", "중앙의 '데이터베이스 만들기(Create Database)' 클릭", "위치(Region) 선택 후 다음", "'테스트 모드'로 시작 선택 (데이터 관리가 쉬워집니다)", "데이터베이스 생성이 완료될 때까지 잠시 대기"]}
                    url="https://console.firebase.google.com/project/aigcoop/firestore"
                />
            );

            if (loading) return (
                <div className="min-h-screen bg-white flex flex-col items-center justify-center">
                    <div className="animate-spin text-indigo-600 mb-4"><Icon name="loader-2" size={40} /></div>
                    <p className="text-slate-400 font-black text-xs tracking-widest uppercase animate-pulse">AIGCOOP CONNECTING</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col max-w-[2000px] mx-auto overflow-x-hidden">
                    {/* Header */}
                    <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b border-slate-100 px-5 py-4 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl">
                                <Icon name="globe" size={22} />
                            </div>
                            <div className="overflow-hidden">
                                <h1 className="font-black text-sm sm:text-base tracking-tighter leading-none mb-1 text-gray-800 truncate uppercase">AIGCOOP 프롬프트 BOOK</h1>
                                <div className="flex items-center gap-1.5">
                                    <div className={`w-1.5 h-1.5 rounded-full ${isAdmin ? 'bg-indigo-500 animate-pulse' : 'bg-slate-300'}`}></div>
                                    <span className="text-[9px] font-black uppercase text-slate-400 tracking-widest">{isAdmin ? 'Admin Mode' : 'Visitor Mode'}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => isAdmin ? setIsAdmin(false) : setIsAdminAuthModalOpen(true)} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${isAdmin ? 'bg-indigo-50 text-indigo-600 shadow-inner' : 'bg-slate-50 text-slate-400'}`}>
                                <Icon name={isAdmin ? "unlock" : "lock"} size={20} />
                            </button>
                            {isAdmin && (
                                <button onClick={() => setIsModalOpen(true)} className="h-10 px-4 bg-indigo-600 text-white rounded-xl font-black text-sm shadow-lg flex items-center gap-1 active:scale-95 transition-transform">
                                    <Icon name="plus-circle" size={18} /> 추가
                                </button>
                            )}
                        </div>
                    </header>

                    {/* Search Area */}
                    <div className="bg-white px-6 py-5 border-b border-slate-50 space-y-4 shadow-sm">
                        <div className="relative max-w-2xl mx-auto">
                            <Icon name="search" size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" />
                            <input type="text" placeholder="제목이나 내용으로 검색..." className="w-full bg-slate-50 border-none rounded-2xl pl-12 pr-5 py-4 text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/5 transition-all" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                        </div>
                        <div className="flex gap-2 overflow-x-auto no-scrollbar justify-start sm:justify-center px-1">
                            {categories.map(cat => (
                                <button key={cat} onClick={() => setSelectedCategory(cat)} className={`flex-shrink-0 px-5 py-2.5 rounded-full text-[10px] font-black border whitespace-nowrap transition-all ${selectedCategory === cat ? 'bg-slate-900 text-white border-slate-900 shadow-lg scale-105' : 'bg-white text-slate-400 border-slate-100 hover:border-slate-300'}`}>{cat}</button>
                            ))}
                        </div>
                    </div>

                    {/* Main Content Grid */}
                    <main className="flex-1 p-4 pb-32 max-w-7xl mx-auto w-full">
                        <div className="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">
                            {filteredPrompts.map((item) => (
                                <div key={item.id} className="group bg-white rounded-[28px] overflow-hidden border border-slate-100 shadow-sm flex flex-col prompt-card zoom-in">
                                    <div className="aspect-video relative overflow-hidden bg-slate-50 cursor-zoom-in" onClick={() => setFullScreenItem(item)}>
                                        {item.imageUrl ? <img src={item.imageUrl} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy" /> : <div className="w-full h-full flex items-center justify-center text-slate-100 bg-slate-50"><Icon name="image" size={40} /></div>}
                                        <div className="absolute top-2 left-2"><span className="bg-white/95 backdrop-blur-md px-2 py-0.5 rounded-md text-[8px] font-black text-indigo-600 shadow-sm uppercase">{item.category}</span></div>
                                        {isAdmin && <button onClick={(e) => { e.stopPropagation(); setIsDeleteModalOpen(item.id); }} className="absolute top-2 right-2 p-1.5 bg-white/95 rounded-full text-slate-300 hover:text-rose-500 transition-colors shadow-sm"><Icon name="trash-2" size={12} /></button>}
                                        <div className="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity"><Icon name="maximize-2" size={20} className="text-white" /></div>
                                    </div>
                                    <div className="p-3 flex flex-col gap-2 bg-white flex-1">
                                        <h3 className="font-black text-slate-800 text-[11px] line-clamp-1">{item.title}</h3>
                                        <button onClick={() => {
                                            const el = document.createElement('textarea'); el.value = item.content; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                                            setCopyStatus(item.id); setTimeout(() => setCopyStatus(null), 2000);
                                            showToast("프롬프트 복사 성공!");
                                        }} className={`w-full py-2.5 rounded-xl text-[10px] font-black transition-all shadow-sm active:scale-95 ${copyStatus === item.id ? 'bg-emerald-500 text-white shadow-emerald-100' : 'bg-slate-900 text-white'}`}>{copyStatus === item.id ? "성공!" : "프롬프트 복사"}</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        {/* Empty State UI */}
                        {filteredPrompts.length === 0 && !loading && (
                            <div className="py-24 text-center">
                                <Icon name="sparkles" size={64} className="mx-auto text-slate-100 mb-4" />
                                <p className="text-slate-400 font-black text-lg mb-8 uppercase tracking-widest italic">멋진 작품을 기다리고 있어요</p>
                                {isAdmin ? (
                                    <div className="flex flex-col items-center gap-4">
                                        <button 
                                            onClick={() => setIsModalOpen(true)}
                                            className="px-10 py-5 bg-indigo-600 text-white rounded-3xl font-black text-lg shadow-2xl shadow-indigo-100 active:scale-95 transition-all flex items-center gap-3"
                                        >
                                            <Icon name="plus-circle" size={24} /> 첫 프롬프트 등록하기
                                        </button>
                                        <button onClick={handleSeedLoad} className="text-indigo-600 font-black text-xs underline underline-offset-4 p-4">기본 샘플 10개 한꺼번에 불러오기</button>
                                    </div>
                                ) : (
                                    <p className="text-slate-300 text-xs font-bold uppercase tracking-widest">관리자 인증 후 콘텐츠를 채워 넣을 수 있습니다.</p>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Detailed Viewer (9:16) */}
                    {fullScreenItem && (
                        <div className="fixed inset-0 z-[1000] bg-black/98 backdrop-blur-md flex flex-col items-center justify-center p-4 sm:p-10 zoom-in" onClick={() => setFullScreenItem(null)}>
                            <button className="absolute top-6 right-6 text-white/40 hover:text-white p-3 bg-white/10 rounded-full transition-all"><Icon name="x" size={32} /></button>
                            <div className="flex flex-col items-center gap-5 max-w-full" onClick={e => e.stopPropagation()}>
                                <img src={fullScreenItem.imageUrl} className="max-h-[60vh] sm:max-h-[65vh] rounded-[40px] object-contain shadow-2xl border border-white/5" style={{ aspectRatio: '9/16' }} />
                                <div className="bg-white/10 backdrop-blur-xl p-8 rounded-[40px] w-full max-w-md border border-white/20">
                                    <div className="flex justify-between items-center mb-5">
                                        <h2 className="text-white text-xl font-black tracking-tight line-clamp-1">{fullScreenItem.title}</h2>
                                        <span className="bg-indigo-600 text-white text-[10px] px-3 py-1.5 rounded-xl font-black uppercase shadow-lg flex-shrink-0">{fullScreenItem.category}</span>
                                    </div>
                                    <div className="bg-black/30 rounded-3xl p-6 text-white/80 font-mono text-xs max-h-40 overflow-y-auto mb-6 leading-relaxed scrollbar-hide italic border border-white/5 select-all">{fullScreenItem.content}</div>
                                    <button onClick={() => {
                                        const el = document.createElement('textarea'); el.value = fullScreenItem.content; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                                        showToast("프롬프트 복사 성공!");
                                    }} className="w-full py-5 bg-indigo-600 text-white rounded-[24px] font-black shadow-xl shadow-indigo-500/20 active:scale-95 transition-all">전체 복사하기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Auth Modal */}
                    {isAdminAuthModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-sm" onClick={() => setIsAdminAuthModalOpen(false)}></div>
                            <div className="relative bg-white w-full max-w-sm rounded-[48px] shadow-2xl p-10 text-center zoom-in">
                                <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-sm"><Icon name="lock" size={32} /></div>
                                <h2 className="text-xl font-black text-slate-800 mb-6 tracking-tight uppercase">Manager Auth</h2>
                                <form onSubmit={handleAdminAuth} className="space-y-4">
                                    <input type="password" placeholder="비밀번호 입력" className="w-full px-6 py-5 bg-slate-50 border-none rounded-[24px] outline-none font-bold text-center tracking-widest focus:ring-4 focus:ring-indigo-500/10 transition-all" value={adminInput} onChange={e => setAdminInput(e.target.value)} autoFocus required />
                                    <button type="submit" className="w-full py-5 bg-indigo-600 text-white rounded-[24px] font-black shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">로그인</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add/Registration Modal */}
                    {isModalOpen && isAdmin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="relative bg-white w-full max-w-md rounded-[48px] shadow-2xl p-10 zoom-in">
                                <h2 className="text-2xl font-black text-slate-800 mb-8 flex items-center gap-3"><Icon name="folder-plus" className="text-indigo-600" /> 신규 프롬프트 등록</h2>
                                <form onSubmit={registerPrompt} className="space-y-6 max-h-[75vh] overflow-y-auto no-scrollbar pr-2">
                                    <input type="text" placeholder="작품 이름" className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-indigo-500/5 transition-all" value={newPrompt.title} onChange={e => setNewPrompt({...newPrompt, title: e.target.value})} required />
                                    
                                    <div className="space-y-2">
                                        <div className="flex gap-2">
                                            <div className="relative flex-1">
                                                <select 
                                                    className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl text-sm font-bold outline-none appearance-none cursor-pointer focus:ring-4 focus:ring-indigo-500/5 transition-all" 
                                                    value={newPrompt.category} 
                                                    onChange={e => setNewPrompt({...newPrompt, category: e.target.value})}
                                                >
                                                    {categories.filter(c => c !== "전체").map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                                </select>
                                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-300">
                                                    <Icon name="chevron-down" size={18} />
                                                </div>
                                            </div>
                                            <button 
                                                type="button" 
                                                onClick={() => setIsAddingNewCategory(!isAddingNewCategory)}
                                                className={`w-14 h-14 rounded-2xl flex items-center justify-center transition-all ${isAddingNewCategory ? 'bg-indigo-600 text-white shadow-lg' : 'bg-indigo-50 text-indigo-600 hover:bg-indigo-100'}`}
                                                title="분류 추가"
                                            >
                                                <Icon name={isAddingNewCategory ? "x" : "plus"} size={24} />
                                            </button>
                                        </div>

                                        {isAddingNewCategory && (
                                            <div className="flex gap-2 animate-in slide-in-from-top-2 duration-300">
                                                <input 
                                                    type="text" 
                                                    placeholder="새 분류 입력 (예: 로고, 스티커)" 
                                                    className="flex-1 px-6 py-4 bg-white border-2 border-indigo-100 rounded-2xl outline-none font-bold text-sm focus:border-indigo-500 transition-all"
                                                    value={tempCategory}
                                                    onChange={e => setTempCategory(e.target.value)}
                                                    onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), handleAddNewCategory())}
                                                />
                                                <button 
                                                    type="button"
                                                    onClick={handleAddNewCategory}
                                                    className="px-6 bg-indigo-600 text-white rounded-2xl font-black text-xs shadow-lg active:scale-95 transition-all"
                                                >
                                                    확인
                                                </button>
                                            </div>
                                        )}
                                    </div>

                                    <div onClick={() => fileInputRef.current?.click()} className="cursor-pointer aspect-video rounded-[32px] border-2 border-dashed flex flex-col items-center justify-center transition-all bg-slate-50 border-slate-200 hover:bg-indigo-50 hover:border-indigo-300 overflow-hidden">
                                        {newPrompt.imageData ? <img src={newPrompt.imageData} className="w-full h-full object-cover" /> : <div className="text-center"><Icon name="upload" size={32} className="text-slate-300 mb-2 mx-auto" /><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">9:16 이미지 업로드</p></div>}
                                    </div>
                                    <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={(e) => {
                                        const f = e.target.files[0];
                                        if (f) {
                                            const r = new FileReader(); r.onloadend = () => {
                                                if (r.result.length > 1000000) showToast("이미지 용량 초과 (1MB 이하 권장)", "error");
                                                else setNewPrompt({...newPrompt, imageData: r.result});
                                            }; r.readAsDataURL(f);
                                        }
                                    }} />
                                    <textarea rows="4" placeholder="AI 프롬프트 내용을 입력하세요" className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none text-sm font-medium resize-none focus:ring-4 focus:ring-indigo-500/5 transition-all" value={newPrompt.content} onChange={e => setNewPrompt({...newPrompt, content: e.target.value})} required />
                                    <button type="submit" className="w-full py-5 bg-indigo-600 text-white rounded-[28px] font-black text-xl shadow-2xl active:scale-95 transition-all">공용 저장소에 등록</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Delete Confirm Modal */}
                    {isDeleteModalOpen && isAdmin && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onClick={() => setIsDeleteModalOpen(null)}></div>
                            <div className="relative bg-white w-full max-w-sm rounded-[48px] p-12 text-center shadow-2xl zoom-in">
                                <Icon name="trash-2" size={48} className="text-rose-500 mb-6 mx-auto" />
                                <h3 className="font-black text-slate-800 text-2xl mb-10 leading-tight">삭제하시겠습니까?</h3>
                                <div className="flex gap-4">
                                    <button onClick={() => setIsDeleteModalOpen(null)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-400 hover:bg-slate-200 transition-colors">취소</button>
                                    <button onClick={async () => {
                                        try {
                                            const path = `artifacts/${appId}/public/data/prompts`;
                                            await db.collection(path).doc(isDeleteModalOpen).delete();
                                            setIsDeleteModalOpen(null); showToast("삭제되었습니다.");
                                        } catch(e) { showToast("삭제 실패", "error"); }
                                    }} className="flex-1 py-4 bg-rose-500 text-white rounded-2xl font-black shadow-lg">삭제</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast && (
                        <div className={`fixed bottom-12 left-1/2 -translate-x-1/2 z-[200] px-8 py-4 rounded-full shadow-2xl text-white text-[12px] font-black flex items-center gap-3 bg-slate-900/95 backdrop-blur-md animate-in slide-in-from-bottom-4`}>
                            <Icon name={toast.type === 'error' ? "alert-circle" : "check"} size={16} className={toast.type === 'error' ? "text-rose-400" : "text-emerald-400"} />
                            {toast.text}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
