<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AIGCOOP 프롬프트 BOOK</title>
    
    <!-- 최적화된 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #F1F5F9; 
            color: #0F172A;
            overscroll-behavior-y: none; /* 당겨서 새로고침 방지 (모바일 최적화) */
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .image-fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .prompt-card { 
            transition: transform 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            will-change: transform;
        }
        .prompt-card:active { transform: scale(0.97); }

        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBY0niSiio0iM7MHlI694xcWcANC8PrUiU",
            authDomain: "aigcoop.firebaseapp.com",
            projectId: "aigcoop",
            storageBucket: "aigcoop.firebasestorage.app",
            messagingSenderId: "39164548544",
            appId: "1:39164548544:web:9a1f088e6436b990d46425",
            measurementId: "G-N1NZNKM7PK"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const DB_NAME = "promptbook1";
        const APP_ID = "aigcoop-optimized-v1";
        const ADMIN_PW = "gcoop1234";

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({
                        elements: [i],
                        attrs: { width: size, height: size, class: className, strokeWidth: 2 }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center"></span>;
        };

        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [prompts, setPrompts] = useState([]);
            const [selectedCategory, setSelectedCategory] = useState("전체");
            const [searchQuery, setSearchQuery] = useState("");
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [fullScreenItem, setFullScreenItem] = useState(null);
            const [toast, setToast] = useState(null);

            const [newPrompt, setNewPrompt] = useState({ title: "", imageData: null, content: "", category: "인물/프로필" });

            // --- 브라우저 히스토리 제어 (뒤로가기 최적화) ---
            useEffect(() => {
                const handlePopState = (e) => {
                    // 뒤로가기 발생 시 모달이나 풀스크린이 열려있다면 그것만 닫음
                    if (fullScreenItem) {
                        setFullScreenItem(null);
                        e.preventDefault();
                    } else if (isModalOpen) {
                        setIsModalOpen(false);
                        e.preventDefault();
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [fullScreenItem, isModalOpen]);

            const openFullScreen = (item) => {
                setFullScreenItem(item);
                window.history.pushState({view: 'detail'}, ''); // 히스토리에 상태 추가
            };

            const closeFullScreen = () => {
                setFullScreenItem(null);
                if (window.history.state?.view === 'detail') window.history.back();
            };

            // --- 데이터 로딩 최적화 ---
            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(async (u) => {
                    if (u) { setUser(u); } 
                    else { await auth.signInAnonymously(); }
                });

                const path = `artifacts/${APP_ID}/public/data/prompts`;
                const unsubData = db.app.firestore(DB_NAME).collection(path).onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setPrompts(data.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
                    setLoading(false);
                }, (err) => {
                    console.error(err);
                    setLoading(false);
                });

                return () => { unsubAuth(); unsubData(); };
            }, []);

            const showToast = (text, type = 'success') => {
                setToast({ text, type });
                setTimeout(() => setToast(null), 2500);
            };

            const optimizeImage = (base64Str) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_SIZE = 800; // 용량 최적화를 위해 크기 하향 조정
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); // 압축률 높임 (속도 향상)
                    };
                });
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!isAdmin || isSaving) return;
                setIsSaving(true);
                try {
                    const path = `artifacts/${APP_ID}/public/data/prompts`;
                    await db.app.firestore(DB_NAME).collection(path).add({
                        ...newPrompt,
                        createdAt: Date.now(),
                        creatorId: user.uid
                    });
                    showToast("등록 완료");
                    setIsModalOpen(false);
                    setNewPrompt({ title: "", imageData: null, content: "", category: "인물/프로필" });
                } catch (e) {
                    showToast("오류 발생", "error");
                } finally { setIsSaving(false); }
            };

            const filtered = useMemo(() => {
                return prompts.filter(p => {
                    const matchCat = selectedCategory === "전체" || p.category === selectedCategory;
                    const matchSearch = p.title.toLowerCase().includes(searchQuery.toLowerCase()) || p.content.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchCat && matchSearch;
                });
            }, [prompts, selectedCategory, searchQuery]);

            if (loading) return (
                <div className="min-h-screen bg-white flex flex-col items-center justify-center">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-slate-400 font-bold text-xs tracking-widest animate-pulse">OPTIMIZING FEED...</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col max-w-5xl mx-auto">
                    {/* Header */}
                    <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-3 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white"><Icon name="zap" size={18} /></div>
                            <h1 className="font-extrabold text-sm tracking-tight text-slate-900">AIGCOOP PROMPT</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => {
                                if(isAdmin) setIsAdmin(false);
                                else {
                                    const pw = prompt("비밀번호를 입력하세요");
                                    if(pw === ADMIN_PW) { setIsAdmin(true); showToast("관리자 인증"); }
                                }
                            }} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-colors ${isAdmin ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500'}`}>
                                <Icon name={isAdmin ? "unlock" : "lock"} size={16} />
                            </button>
                            {isAdmin && (
                                <button onClick={() => setIsModalOpen(true)} className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 shadow-md">
                                    <Icon name="plus" size={14} /> 추가
                                </button>
                            )}
                        </div>
                    </header>

                    {/* Search & Filter */}
                    <div className="bg-white p-4 space-y-3 shadow-sm border-b border-slate-100">
                        <div className="relative">
                            <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                            <input type="text" placeholder="검색어를 입력하세요..." className="w-full bg-slate-100 border-none rounded-xl pl-10 pr-4 py-2.5 text-sm font-medium focus:ring-2 focus:ring-indigo-500 outline-none transition-all" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                        </div>
                        <div className="flex gap-1.5 overflow-x-auto no-scrollbar pb-1">
                            {["전체", "인물/프로필", "애니메이션", "광고/홍보", "배경/풍경"].map(cat => (
                                <button key={cat} onClick={() => setSelectedCategory(cat)} className={`flex-shrink-0 px-4 py-1.5 rounded-full text-[11px] font-bold border transition-all ${selectedCategory === cat ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-500 border-slate-200 hover:border-slate-400'}`}>{cat}</button>
                            ))}
                        </div>
                    </div>

                    {/* Content Grid */}
                    <main className="flex-1 p-3 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                        {filtered.map(item => (
                            <div key={item.id} className="prompt-card bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 flex flex-col" onClick={() => openFullScreen(item)}>
                                <div className="aspect-[3/4] bg-slate-100 relative overflow-hidden">
                                    {item.imageData ? (
                                        <img src={item.imageData} className="w-full h-full object-cover image-fade-in" loading="lazy" />
                                    ) : (
                                        <div className="w-full h-full flex items-center justify-center text-slate-300"><Icon name="image" size={32} /></div>
                                    )}
                                    <div className="absolute top-2 left-2"><span className="bg-black/60 backdrop-blur-md text-white px-2 py-0.5 rounded-md text-[9px] font-bold">{item.category}</span></div>
                                </div>
                                <div className="p-2.5 flex flex-col gap-1">
                                    <h3 className="font-bold text-slate-900 text-[11px] line-clamp-1">{item.title}</h3>
                                    <p className="text-slate-400 text-[9px] line-clamp-1 italic">{item.content}</p>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Empty State */}
                    {filtered.length === 0 && (
                        <div className="py-20 text-center flex flex-col items-center gap-3">
                            <Icon name="inbox" size={48} className="text-slate-200" />
                            <p className="text-slate-400 font-bold text-sm">프롬프트가 없습니다.</p>
                        </div>
                    )}

                    {/* Modals */}
                    {fullScreenItem && (
                        <div className="fixed inset-0 z-[100] bg-white flex flex-col animate-in fade-in slide-in-from-bottom-4 duration-300 overflow-y-auto">
                            <div className="sticky top-0 z-10 p-4 flex justify-between items-center bg-white/80 backdrop-blur-md">
                                <button onClick={closeFullScreen} className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600"><Icon name="chevron-left" size={24} /></button>
                                <span className="text-xs font-extrabold text-slate-400 uppercase tracking-widest">{fullScreenItem.category}</span>
                                <div className="w-10"></div>
                            </div>
                            <div className="p-4 flex flex-col gap-6 safe-bottom">
                                <img src={fullScreenItem.imageData} className="w-full rounded-3xl shadow-2xl object-cover aspect-[3/4]" />
                                <div className="space-y-4">
                                    <h2 className="text-2xl font-extrabold text-slate-900 leading-tight">{fullScreenItem.title}</h2>
                                    <div className="bg-slate-50 border border-slate-100 rounded-2xl p-5 relative group">
                                        <div className="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap font-medium">{fullScreenItem.content}</div>
                                        <button onClick={() => {
                                            const el = document.createElement('textarea'); el.value = fullScreenItem.content; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                                            showToast("프롬프트 복사 성공!");
                                        }} className="absolute top-4 right-4 p-2 bg-indigo-600 text-white rounded-lg shadow-lg active:scale-90 transition-transform"><Icon name="copy" size={16} /></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[110] bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4">
                            <div className="bg-white w-full max-w-md rounded-t-[32px] sm:rounded-[32px] p-6 shadow-2xl animate-in slide-in-from-bottom-full duration-300">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-extrabold">새 작품 등록</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400"><Icon name="x" size={24} /></button>
                                </div>
                                <form onSubmit={handleSave} className="space-y-4 safe-bottom">
                                    <input type="text" placeholder="작품 이름" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none" value={newPrompt.title} onChange={e => setNewPrompt({...newPrompt, title: e.target.value})} required />
                                    <select className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none appearance-none" value={newPrompt.category} onChange={e => setNewPrompt({...newPrompt, category: e.target.value})}>
                                        {["인물/프로필", "애니메이션", "광고/홍보", "배경/풍경"].map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <div className="border-2 border-dashed border-slate-200 rounded-2xl h-40 flex flex-col items-center justify-center relative overflow-hidden bg-slate-50 cursor-pointer" onClick={() => document.getElementById('file-up').click()}>
                                        {newPrompt.imageData ? <img src={newPrompt.imageData} className="w-full h-full object-cover" /> : <div className="text-center text-slate-400"><Icon name="upload" size={24} /><p className="text-[10px] mt-2 font-bold uppercase">Click to upload image</p></div>}
                                    </div>
                                    <input id="file-up" type="file" accept="image/*" className="hidden" onChange={async (e) => {
                                        const f = e.target.files[0]; if (f) {
                                            const reader = new FileReader();
                                            reader.onloadend = async () => {
                                                const opt = await optimizeImage(reader.result);
                                                setNewPrompt({...newPrompt, imageData: opt});
                                            };
                                            reader.readAsDataURL(f);
                                        }
                                    }} />
                                    <textarea rows="4" placeholder="AI 프롬프트 내용" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-indigo-500 outline-none resize-none" value={newPrompt.content} onChange={e => setNewPrompt({...newPrompt, content: e.target.value})} required />
                                    <button type="submit" disabled={isSaving} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-extrabold text-lg shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                                        {isSaving ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <><Icon name="send" size={20} /> 서버 등록</>}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 bg-slate-900 text-white rounded-full shadow-2xl flex items-center gap-2 animate-in slide-in-from-bottom-4 duration-300">
                            <Icon name={toast.type === 'error' ? "alert-circle" : "check-circle"} size={16} className={toast.type === 'error' ? "text-rose-400" : "text-emerald-400"} />
                            <span className="text-xs font-bold">{toast.text}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
