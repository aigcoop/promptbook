<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AIGCOOP 프롬프트 BOOK (Local)</title>
    
    <!-- 필수 라이브러리 (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #F1F5F9; 
            color: #0F172A; 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .zoom-in { animation: zoomIn 0.25s ease-out; }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .prompt-card { 
            transition: all 0.3s ease;
            background: white;
            border: 1px solid #E2E8F0;
        }
        .prompt-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.1);
        }

        input:focus, select:focus, textarea:focus {
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            border-color: #4F46E5;
        }

        .icon-wrapper { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            line-height: 0; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- 관리자 비밀번호 (로컬 수정 권한용) ---
        const ADMIN_PASSWORD = "gcoop1234";
        const STORAGE_KEY = "aigcoop_prompts_v1";

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({
                        elements: [i],
                        attrs: { width: size, height: size, class: className, strokeWidth: 2.5 }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="icon-wrapper"></span>;
        };

        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [loading, setLoading] = useState(true);
            const [prompts, setPrompts] = useState([]);
            const [categories, setCategories] = useState(["전체", "인물/프로필", "애니메이션", "광고/홍보", "배경/풍경"]);
            const [selectedCategory, setSelectedCategory] = useState("전체");
            const [searchQuery, setSearchQuery] = useState("");
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isAdminAuthModalOpen, setIsAdminAuthModalOpen] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(null);
            const [fullScreenItem, setFullScreenItem] = useState(null);
            
            const [adminInput, setAdminInput] = useState("");
            const [toast, setToast] = useState(null);

            const [newPrompt, setNewPrompt] = useState({ title: "", imageData: null, content: "", category: "인물/프로필" });
            const [editingId, setEditingId] = useState(null);
            const [isAddingNewCategory, setIsAddingNewCategory] = useState(false);
            const [tempCategory, setTempCategory] = useState("");
            const fileInputRef = useRef(null);

            // 1. 데이터 로드 (LocalStorage에서 가져오기)
            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setPrompts(parsed);
                        // 저장된 데이터에서 카테고리 추출 및 통합
                        const dbCategories = [...new Set(parsed.map(item => item.category))];
                        setCategories(prev => [...new Set([...prev, ...dbCategories])]);
                    } catch (e) {
                        console.error("Data load error", e);
                    }
                }
                setLoading(false);
            }, []);

            // 2. 데이터 저장 (상태가 바뀔 때마다 LocalStorage 업데이트)
            useEffect(() => {
                if (!loading) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
                }
            }, [prompts, loading]);

            const showToast = (text, type = 'success') => {
                setToast({ text, type });
                setTimeout(() => setToast(null), 3000);
            };

            const handleAdminAuth = (e) => {
                e.preventDefault();
                if (adminInput.trim() === ADMIN_PASSWORD) {
                    setIsAdmin(true); 
                    setIsAdminAuthModalOpen(false); 
                    setAdminInput(""); 
                    showToast("관리자 모드 활성화");
                } else { 
                    showToast("비밀번호가 틀렸습니다.", "error"); 
                }
            };

            const optimizeImage = (base64Str) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_SIZE = 800; // 로컬 저장 용량 제한을 고려하여 크기 축소
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); // 압축률 높임
                    };
                });
            };

            const closeAddModal = () => {
                setIsModalOpen(false);
                setEditingId(null);
                setNewPrompt({ title: "", imageData: null, content: "", category: "인물/프로필" });
                setIsAddingNewCategory(false);
                setTempCategory("");
            };

            const registerPrompt = (e) => {
                if (e) e.preventDefault();
                if (!isAdmin) return;
                
                const dataToSave = { 
                    ...newPrompt, 
                    id: editingId || Date.now().toString(),
                    createdAt: editingId ? prompts.find(p => p.id === editingId).createdAt : Date.now()
                };

                if (editingId) {
                    setPrompts(prompts.map(p => p.id === editingId ? dataToSave : p));
                    showToast("수정되었습니다.");
                } else {
                    setPrompts([dataToSave, ...prompts]);
                    showToast("내 폰에 등록되었습니다.");
                }
                closeAddModal();
            };

            const filteredPrompts = useMemo(() => {
                return prompts.filter(p => {
                    const q = searchQuery.toLowerCase();
                    const c = selectedCategory === "전체" || p.category === selectedCategory;
                    const s = (p.title || "").toLowerCase().includes(q) || (p.content || "").toLowerCase().includes(q);
                    return c && s;
                });
            }, [prompts, selectedCategory, searchQuery]);

            if (loading) return (
                <div className="min-h-screen bg-white flex flex-col items-center justify-center font-black">
                    <p className="text-indigo-600 animate-pulse uppercase tracking-widest text-xs">Loading Local Data</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col max-w-[2000px] mx-auto overflow-x-hidden">
                    <header className="sticky top-0 z-40 bg-white/95 backdrop-blur-xl border-b border-slate-200 px-5 py-4 flex items-center justify-between shadow-sm font-black">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><Icon name="smartphone" size={22} /></div>
                            <div className="flex flex-col">
                                <h1 className="text-sm sm:text-base tracking-tighter text-slate-900 uppercase leading-none mb-1">AIGCOOP 프롬프트 BOOK</h1>
                                <span className="text-[8px] text-indigo-500 opacity-70 tracking-widest uppercase">Local Storage Mode</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => isAdmin ? setIsAdmin(false) : setIsAdminAuthModalOpen(true)} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${isAdmin ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white border border-slate-300 text-slate-800'}`}>
                                <Icon name={isAdmin ? "unlock" : "lock"} size={20} />
                            </button>
                            {isAdmin && (
                                <button onClick={() => { setEditingId(null); setIsModalOpen(true); }} className="h-10 px-4 bg-indigo-600 text-white rounded-xl font-black text-sm shadow-xl flex items-center gap-2 active:scale-95 transition-transform">
                                    <Icon name="plus" size={18} /> 추가
                                </button>
                            )}
                        </div>
                    </header>

                    <div className="bg-white px-6 py-5 border-b border-slate-200 space-y-4 shadow-sm text-slate-900 font-bold">
                        <div className="relative max-w-2xl mx-auto">
                            <Icon name="search" size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" />
                            <input type="text" placeholder="내 프롬프트 검색..." className="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-12 pr-5 py-4 text-sm font-bold outline-none text-slate-900 shadow-inner" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                        </div>
                        <div className="flex gap-2 overflow-x-auto no-scrollbar justify-start sm:justify-center">
                            {categories.map(cat => (
                                <button key={cat} onClick={() => setSelectedCategory(cat)} className={`flex-shrink-0 px-5 py-2.5 rounded-full text-[10px] font-black border whitespace-nowrap transition-all ${selectedCategory === cat ? 'bg-slate-900 text-white border-slate-900 shadow-lg scale-105' : 'bg-white text-slate-700 border-slate-300'}`}>{cat}</button>
                            ))}
                        </div>
                    </div>

                    <main className="flex-1 p-4 pb-32 max-w-7xl mx-auto w-full">
                        <div className="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">
                            {filteredPrompts.map((item) => (
                                <div key={item.id} className="group rounded-[28px] overflow-hidden prompt-card zoom-in relative flex flex-col bg-white">
                                    <div className="aspect-video relative overflow-hidden bg-slate-100 cursor-zoom-in" onClick={() => setFullScreenItem(item)}>
                                        {item.imageData ? <img src={item.imageData} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" /> : <div className="w-full h-full flex items-center justify-center text-slate-300"><Icon name="image" size={40} /></div>}
                                        <div className="absolute top-2 left-2"><span className="bg-slate-900 text-white px-2 py-0.5 rounded-md text-[8px] font-black shadow-sm uppercase">{item.category}</span></div>
                                        {isAdmin && (
                                            <div className="absolute top-2 right-2 flex gap-1 animate-in slide-in-from-top-1">
                                                <button onClick={(e) => { e.stopPropagation(); setEditingId(item.id); setNewPrompt({...item}); setIsModalOpen(true); }} className="p-2 bg-white/95 text-indigo-700 rounded-full shadow-md active:scale-90"><Icon name="pencil" size={12} /></button>
                                                <button onClick={(e) => { e.stopPropagation(); setIsDeleteModalOpen(item.id); }} className="p-2 bg-white/95 text-rose-700 rounded-full shadow-md active:scale-90"><Icon name="trash-2" size={12} /></button>
                                            </div>
                                        )}
                                        <div className="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity pointer-events-none"><Icon name="maximize-2" size={20} className="text-white" /></div>
                                    </div>
                                    <div className="p-3 flex flex-col gap-2 flex-1">
                                        <h3 className="font-black text-slate-900 text-[11px] line-clamp-1">{item.title}</h3>
                                        <button onClick={() => {
                                            const el = document.createElement('textarea'); el.value = item.content; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                                            showToast("프롬프트 복사 완료!");
                                        }} className="w-full py-2 bg-slate-900 text-white rounded-xl text-[10px] font-black hover:bg-indigo-600 active:scale-95 shadow-sm">복사하기</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        {filteredPrompts.length === 0 && (
                            <div className="py-24 text-center">
                                <Icon name="sparkles" size={64} className="mx-auto text-slate-200 mb-4" />
                                <p className="text-slate-500 font-black text-lg mb-8 italic tracking-wider">나만의 프롬프트를 등록해 보세요</p>
                                {isAdmin && (
                                    <button onClick={() => setIsModalOpen(true)} className="px-10 py-5 bg-indigo-600 text-white rounded-3xl font-black text-lg shadow-2xl active:scale-95 transition-all flex items-center gap-3 mx-auto">
                                        <Icon name="plus-circle" size={24} /> 프롬프트 등록
                                    </button>
                                )}
                            </div>
                        )}
                    </main>

                    {isModalOpen && isAdmin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onClick={closeAddModal}></div>
                            <div className="relative bg-white w-full max-w-md rounded-[48px] shadow-2xl p-10 zoom-in overflow-hidden">
                                <button onClick={closeAddModal} className="absolute top-8 right-8 w-10 h-10 bg-slate-100 text-slate-800 rounded-full flex items-center justify-center hover:bg-rose-50 hover:text-rose-600 transition-all z-10"><Icon name="x" size={20} /></button>
                                <h2 className="text-2xl font-black text-slate-900 mb-8 flex items-center gap-3 font-black underline decoration-indigo-500 decoration-4 underline-offset-8">
                                    {editingId ? "프롬프트 수정" : "프롬프트 등록"}
                                </h2>
                                <form onSubmit={registerPrompt} className="space-y-6 max-h-[75vh] overflow-y-auto no-scrollbar pr-2 pb-4 text-slate-900 font-bold">
                                    <input type="text" placeholder="작품 이름" className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none shadow-inner" value={newPrompt.title} onChange={e => setNewPrompt({...newPrompt, title: e.target.value})} required />
                                    <div className="space-y-2">
                                        <div className="flex gap-2">
                                            <select className="flex-1 px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 outline-none appearance-none cursor-pointer" value={newPrompt.category} onChange={e => setNewPrompt({...newPrompt, category: e.target.value})}>
                                                {categories.filter(c => c !== "전체").map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                            </select>
                                            <button type="button" onClick={() => setIsAddingNewCategory(!isAddingNewCategory)} className={`w-14 h-14 rounded-2xl flex items-center justify-center transition-all ${isAddingNewCategory ? 'bg-indigo-600 text-white' : 'bg-indigo-50 text-indigo-600 hover:bg-indigo-100'}`}><Icon name={isAddingNewCategory ? "x" : "plus"} size={24} /></button>
                                        </div>
                                        {isAddingNewCategory && (
                                            <div className="flex gap-2 animate-in slide-in-from-top-2">
                                                <input type="text" placeholder="새 분류명" className="flex-1 px-6 py-4 bg-white border border-indigo-200 rounded-2xl outline-none font-bold text-sm" value={tempCategory} onChange={e => setTempCategory(e.target.value)} onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), setCategories([...categories, tempCategory.trim()]), setNewPrompt({...newPrompt, category: tempCategory.trim()}), setTempCategory(""), setIsAddingNewCategory(false))} />
                                                <button type="button" onClick={() => { if(tempCategory.trim()){ setCategories([...categories, tempCategory.trim()]); setNewPrompt({...newPrompt, category: tempCategory.trim()}); setTempCategory(""); setIsAddingNewCategory(false); } }} className="px-6 bg-indigo-600 text-white rounded-2xl font-black text-xs shadow-lg">확인</button>
                                            </div>
                                        )}
                                    </div>
                                    <div onClick={() => fileInputRef.current?.click()} className="cursor-pointer aspect-video rounded-[32px] border-2 border-dashed border-slate-200 flex flex-col items-center justify-center transition-all bg-slate-50 hover:bg-indigo-50 overflow-hidden relative group">
                                        {newPrompt.imageData ? <img src={newPrompt.imageData} className="w-full h-full object-cover" /> : <div className="text-center"><Icon name="upload" size={32} className="text-slate-300 mb-2 mx-auto" /><p className="text-[10px] font-black text-slate-500 uppercase text-center">이미지 선택 (자동 최적화)</p></div>}
                                    </div>
                                    <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={(e) => {
                                        const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onloadend = async () => { const opt = await optimizeImage(r.result); setNewPrompt({...newPrompt, imageData: opt}); }; r.readAsDataURL(f); }
                                    }} />
                                    <textarea rows="4" placeholder="AI 프롬프트 내용을 입력하세요" className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm font-medium resize-none shadow-inner" value={newPrompt.content} onChange={e => setNewPrompt({...newPrompt, content: e.target.value})} required />
                                    <button type="submit" className="w-full py-5 rounded-[28px] font-black text-xl shadow-2xl transition-all bg-indigo-600 text-white active:scale-95 uppercase tracking-widest">
                                        {editingId ? "수정 완료" : "내 폰에 저장하기"}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {isAdminAuthModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-sm" onClick={() => setIsAdminAuthModalOpen(false)}></div>
                            <div className="relative bg-white w-full max-w-sm rounded-[48px] shadow-2xl p-12 text-center zoom-in text-slate-900 font-black">
                                <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-[32px] flex items-center justify-center mx-auto mb-8 shadow-sm"><Icon name="lock" size={40} /></div>
                                <h2 className="text-xl font-black mb-8 tracking-tight uppercase tracking-widest">Admin Authentication</h2>
                                <form onSubmit={handleAdminAuth} className="space-y-4">
                                    <input type="password" placeholder="PASSWORD" className="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-[24px] outline-none font-black text-center tracking-[1em] text-lg focus:bg-white transition-all shadow-inner" value={adminInput} onChange={e => setAdminInput(e.target.value)} autoFocus required />
                                    <button type="submit" className="w-full py-5 bg-slate-900 text-white rounded-[24px] font-black shadow-xl active:scale-95 transition-all text-sm uppercase tracking-widest hover:bg-black">Unlock</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {fullScreenItem && (
                        <div className="fixed inset-0 z-[1000] bg-black/98 backdrop-blur-md flex flex-col items-center justify-center p-4 sm:p-10 zoom-in" onClick={() => setFullScreenItem(null)}>
                            <button className="absolute top-6 right-6 text-white/60 hover:text-white p-3 bg-white/10 rounded-full transition-all"><Icon name="x" size={32} /></button>
                            <div className="flex flex-col items-center gap-5 max-w-full text-white" onClick={e => e.stopPropagation()}>
                                <img src={fullScreenItem.imageData || fullScreenItem.imageUrl} className="max-h-[60vh] sm:max-h-[65vh] rounded-[40px] object-contain shadow-2xl border border-white/10" style={{ aspectRatio: '9/16' }} />
                                <div className="bg-white/10 backdrop-blur-xl p-8 rounded-[40px] w-full max-w-md border border-white/20">
                                    <div className="flex justify-between items-center mb-5">
                                        <h2 className="text-xl font-black tracking-tight line-clamp-1">{fullScreenItem.title}</h2>
                                        <span className="bg-indigo-600 text-white text-[10px] px-3 py-1.5 rounded-xl font-black uppercase shadow-lg flex-shrink-0">{fullScreenItem.category}</span>
                                    </div>
                                    <div className="bg-black/40 rounded-3xl p-6 text-white/90 font-mono text-xs max-h-40 overflow-y-auto mb-6 leading-relaxed italic border border-white/5 select-all font-bold">{fullScreenItem.content}</div>
                                    <button onClick={() => {
                                        const el = document.createElement('textarea'); el.value = fullScreenItem.content; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                                        showToast("프롬프트 복사 성공!");
                                    }} className="w-full py-5 bg-indigo-600 text-white rounded-[24px] font-black shadow-xl active:scale-95 transition-all uppercase tracking-widest text-sm font-bold">Copy Prompt</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isDeleteModalOpen && isAdmin && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 text-slate-900 font-black">
                            <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onClick={() => setIsDeleteModalOpen(null)}></div>
                            <div className="relative bg-white w-full max-w-sm rounded-[48px] p-12 text-center shadow-2xl zoom-in">
                                <Icon name="trash-2" size={48} className="text-rose-600 mb-6 mx-auto" />
                                <h3 className="font-black text-2xl mb-10 leading-tight">작품을 삭제할까요?</h3>
                                <div className="flex gap-4">
                                    <button onClick={() => setIsDeleteModalOpen(null)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-600">취소</button>
                                    <button onClick={() => {
                                        setPrompts(prompts.filter(p => p.id !== isDeleteModalOpen));
                                        setIsDeleteModalOpen(null); 
                                        showToast("삭제되었습니다.");
                                    }} className="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black shadow-lg">삭제</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {toast && (
                        <div className={`fixed bottom-12 left-1/2 -translate-x-1/2 z-[200] px-8 py-4 rounded-full shadow-2xl text-white text-[12px] font-black flex items-center gap-3 bg-slate-900/95 backdrop-blur-md animate-in slide-in-from-bottom-4 font-bold shadow-indigo-500/20 border border-white/10`}>
                            <Icon name={toast.type === 'error' ? "alert-circle" : "check"} size={16} className={toast.type === 'error' ? "text-rose-400" : "text-emerald-400"} />
                            {toast.text}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
