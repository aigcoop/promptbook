<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AIGCOOP 프롬프트 BOOK</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compat version for global variables) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #F9FAFB;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .zoom-in { animation: zoomIn 0.3s ease-out; }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Firebase Initialisation ---
        const config = JSON.parse(__firebase_config);
        firebase.initializeApp(config);
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        // RULE 1: Ensure appId is correctly identified
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gcoop-prompt-book-v10';
        const ADMIN_PASSWORD = "gcoop1234";

        const SEED_DATA = [
            { title: "네온 사이버펑크 서울", category: "배경/풍경", content: "Vertical cinematic shot, Cyberpunk Seoul street at night, neon signs in Korean characters, rain reflecting on asphalt, 8k, hyper-realistic, 9:16 aspect ratio.", imageUrl: "https://images.unsplash.com/photo-1534239143101-1b1c627395c5?q=80&w=1000&auto=format&fit=crop" },
            { title: "지브리 감성 숲속", category: "애니메이션", content: "Studio Ghibli art style, a hidden library inside a giant tree, sunbeams, magical atmosphere, warm colors, detailed, 9:16.", imageUrl: "https://images.unsplash.com/photo-1516214626895-051a546ccdf2?q=80&w=1000&auto=format&fit=crop" },
            { title: "럭셔리 골드 향수", category: "광고/홍보", content: "Premium gold perfume bottle on silk fabric, soft studio lighting, elegant shadows, bokeh background, sharp focus, 8k, 9:16.", imageUrl: "https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=1000&auto=format&fit=crop" }
        ];

        // --- Icon Component ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [prompts, setPrompts] = useState([]);
            const [categories, setCategories] = useState(["전체", "인물/프로필", "애니메이션", "광고/홍보", "배경/풍경"]);
            const [selectedCategory, setSelectedCategory] = useState("전체");
            const [searchQuery, setSearchQuery] = useState("");
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isAdminAuthModalOpen, setIsAdminAuthModalOpen] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(null);
            const [fullScreenItem, setFullScreenItem] = useState(null);
            
            const [adminInput, setAdminInput] = useState("");
            const [copyStatus, setCopyStatus] = useState(null);
            const [toast, setToast] = useState(null);

            const [newPrompt, setNewPrompt] = useState({ title: "", imageData: null, content: "", category: "인물/프로필" });
            const [isAddingNewCategory, setIsAddingNewCategory] = useState(false);
            const [tempCategory, setTempCategory] = useState("");
            const fileInputRef = useRef(null);

            // 1. Authentication (RULE 3: Auth Before Queries)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        // Check for custom token first as per environment instructions
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) {
                        console.error("Auth Error", e);
                        setLoading(false);
                    }
                };

                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });

                initAuth();
                return () => unsubscribe();
            }, []);

            // 2. Data Synchronisation (RULE 1 & 2)
            useEffect(() => {
                // IMPORTANT: Guard every Firestore operation with if (!user) return; (RULE 3)
                if (!user) return;
                
                // Strict Path (RULE 1): /artifacts/{appId}/public/data/{collectionName}
                const promptsCollection = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('prompts');
                
                const unsub = promptsCollection.onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // RULE 2: Filter/Sort in JS memory
                    setPrompts(data.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
                }, (err) => {
                    console.error("Firestore Permission error:", err);
                    if (err.code === 'permission-denied') {
                        // Re-auth attempt or notification
                    }
                });
                
                return () => unsub();
            }, [user]);

            const showToast = (text, type = 'success') => {
                setToast({ text, type });
                setTimeout(() => setToast(null), 2500);
            };

            const handleAdminAuth = (e) => {
                e.preventDefault();
                if (adminInput === ADMIN_PASSWORD) {
                    setIsAdmin(true);
                    setIsAdminAuthModalOpen(false);
                    setAdminInput("");
                    showToast("관리자 권한 활성화");
                } else {
                    showToast("비밀번호 오류", "error");
                }
            };

            const registerPrompt = async (e) => {
                e.preventDefault();
                if (!isAdmin || !user) return;
                try {
                    const promptsCollection = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('prompts');
                    await promptsCollection.add({
                        ...newPrompt,
                        imageUrl: newPrompt.imageData || "",
                        createdAt: Date.now(),
                        creatorId: user.uid
                    });
                    setNewPrompt({ title: "", imageData: null, content: "", category: "인물/프로필" });
                    setIsModalOpen(false);
                    showToast("등록 완료");
                } catch (e) { 
                    console.error("Register Error:", e);
                    showToast("등록 실패", "error"); 
                }
            };

            const filteredPrompts = useMemo(() => {
                return prompts.filter(p => {
                    const q = searchQuery.toLowerCase();
                    const c = selectedCategory === "전체" || p.category === selectedCategory;
                    const s = (p.title || "").toLowerCase().includes(q) || (p.content || "").toLowerCase().includes(q);
                    return c && s;
                });
            }, [prompts, selectedCategory, searchQuery]);

            if (loading) return (
                <div className="min-h-screen bg-white flex flex-col items-center justify-center">
                    <div className="animate-spin text-indigo-600 mb-4"><Icon name="loader-2" size={40} /></div>
                    <p className="text-slate-400 font-black text-xs tracking-widest uppercase animate-pulse">GCOOP CLOUD CONNECTING</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b border-slate-100 px-5 py-4 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-indigo-100">
                                <Icon name="globe" size={22} />
                            </div>
                            <div className="overflow-hidden">
                                <h1 className="font-black text-sm sm:text-base tracking-tighter leading-none mb-1 text-gray-800 truncate">AIGCOOP 프롬프트 BOOK</h1>
                                <div className="flex items-center gap-1.5">
                                    <div className={`w-1.5 h-1.5 rounded-full ${isAdmin ? 'bg-indigo-500 animate-pulse' : 'bg-slate-300'}`}></div>
                                    <span className="text-[9px] font-black uppercase text-slate-400 tracking-widest">{isAdmin ? 'Admin' : 'Visitor'}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => isAdmin ? setIsAdmin(false) : setIsAdminAuthModalOpen(true)} className="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-slate-400 transition-all hover:bg-slate-100">
                                <Icon name={isAdmin ? "unlock" : "lock"} size={20} />
                            </button>
                            {isAdmin && (
                                <button onClick={() => setIsModalOpen(true)} className="h-10 px-4 bg-indigo-600 text-white rounded-xl font-black text-sm shadow-lg flex items-center gap-1 active:scale-95 transition-transform">
                                    <Icon name="plus" size={18} /> <span className="hidden sm:inline">추가</span>
                                </button>
                            )}
                        </div>
                    </header>

                    {/* Search & Categories */}
                    <div className="bg-white px-6 py-5 border-b border-slate-50 space-y-4">
                        <div className="relative max-w-xl mx-auto">
                            <Icon name="search" size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" />
                            <input 
                                type="text" 
                                placeholder="제목이나 프롬프트 내용 검색..." 
                                className="w-full bg-slate-50 border-none rounded-2xl pl-12 pr-5 py-3.5 text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/5 transition-all" 
                                value={searchQuery} 
                                onChange={e => setSearchQuery(e.target.value)} 
                            />
                        </div>
                        <div className="flex gap-2 overflow-x-auto no-scrollbar justify-start sm:justify-center px-2">
                            {categories.map(cat => (
                                <button 
                                    key={cat} 
                                    onClick={() => setSelectedCategory(cat)} 
                                    className={`flex-shrink-0 px-5 py-2 rounded-full text-[10px] font-black border whitespace-nowrap transition-all ${selectedCategory === cat ? 'bg-slate-900 text-white border-slate-900 shadow-lg scale-105' : 'bg-white text-slate-400 border-slate-200 hover:border-slate-300'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Grid */}
                    <main className="flex-1 p-4 pb-32 max-w-7xl mx-auto w-full">
                        <div className="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                            {filteredPrompts.map((item) => (
                                <div key={item.id} className="group bg-white rounded-[28px] overflow-hidden border border-slate-100 shadow-sm hover:shadow-2xl transition-all duration-500 flex flex-col">
                                    <div className="aspect-video relative overflow-hidden bg-slate-50 cursor-zoom-in" onClick={() => setFullScreenItem(item)}>
                                        {item.imageUrl ? <img src={item.imageUrl} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy" /> : <div className="w-full h-full flex items-center justify-center text-slate-100"><Icon name="image" size={40} /></div>}
                                        <div className="absolute top-2 left-2 flex items-center gap-1">
                                            <span className="bg-white/95 backdrop-blur-md px-2 py-0.5 rounded-md text-[8px] font-black text-indigo-600 shadow-sm uppercase tracking-tighter">{item.category}</span>
                                        </div>
                                        {isAdmin && (
                                            <button onClick={(e) => { e.stopPropagation(); setIsDeleteModalOpen(item.id); }} className="absolute top-2 right-2 p-1.5 bg-white/95 rounded-full text-slate-300 hover:text-rose-500 transition-colors shadow-sm">
                                                <Icon name="trash-2" size={12} />
                                            </button>
                                        )}
                                        <div className="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                            <Icon name="maximize-2" size={20} className="text-white" />
                                        </div>
                                    </div>
                                    <div className="p-3 flex flex-col gap-2 bg-white flex-1">
                                        <h3 className="font-black text-slate-800 text-[11px] line-clamp-1">{item.title}</h3>
                                        <button 
                                            onClick={() => {
                                                const el = document.createElement('textarea'); 
                                                el.value = item.content; 
                                                document.body.appendChild(el); 
                                                el.select(); 
                                                document.execCommand('copy'); 
                                                document.body.removeChild(el);
                                                setCopyStatus(item.id); 
                                                setTimeout(() => setCopyStatus(null), 2000);
                                                showToast("복사됨");
                                            }} 
                                            className={`w-full py-2.5 rounded-xl text-[10px] font-black transition-all shadow-md active:scale-95 ${copyStatus === item.id ? 'bg-emerald-500 text-white shadow-emerald-200' : 'bg-slate-900 text-white hover:bg-indigo-600'}`}
                                        >
                                            {copyStatus === item.id ? "복사 성공!" : "프롬프트 복사"}
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        {filteredPrompts.length === 0 && (
                            <div className="py-24 text-center">
                                <Icon name="sparkles" size={60} className="mx-auto text-slate-100 mb-5" />
                                <p className="text-slate-400 font-black text-sm">데이터가 없습니다.</p>
                                {isAdmin && (
                                    <button onClick={async () => {
                                        try {
                                            const promptsCollection = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('prompts');
                                            for(const s of SEED_DATA) {
                                                await promptsCollection.add({ ...s, createdAt: Date.now(), creatorId: user.uid });
                                            }
                                            showToast("샘플 데이터 로드 완료");
                                        } catch (e) {
                                            showToast("권한이 없습니다", "error");
                                        }
                                    }} className="mt-6 px-6 py-3 bg-indigo-50 text-indigo-600 rounded-full font-black text-xs shadow-sm active:scale-95 transition-transform">
                                        기본 예시 로드하기
                                    </button>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Fullscreen Viewer (9:16) */}
                    {fullScreenItem && (
                        <div className="fixed inset-0 z-[1000] bg-black/98 backdrop-blur-md flex flex-col items-center justify-center p-4 sm:p-10 zoom-in" onClick={() => setFullScreenItem(null)}>
                            <button className="absolute top-6 right-6 text-white/50 hover:text-white p-3 bg-white/10 rounded-full transition-colors">
                                <Icon name="x" size={32} />
                            </button>
                            <div className="flex flex-col items-center gap-4 sm:gap-6 max-w-full" onClick={e => e.stopPropagation()}>
                                <div className="relative">
                                    <img 
                                        src={fullScreenItem.imageUrl} 
                                        className="max-h-[60vh] sm:max-h-[70vh] rounded-3xl object-contain shadow-2xl border border-white/5" 
                                        style={{ aspectRatio: '9/16' }}
                                    />
                                </div>
                                <div className="bg-white/10 backdrop-blur-xl p-6 rounded-[32px] w-full max-w-md border border-white/20">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-white text-lg sm:text-xl font-black">{fullScreenItem.title}</h2>
                                        <span className="bg-indigo-600 text-white text-[9px] px-2 py-1 rounded-lg font-black uppercase">{fullScreenItem.category}</span>
                                    </div>
                                    <div className="bg-black/30 rounded-2xl p-5 text-white/70 font-mono text-xs max-h-32 overflow-y-auto mb-5 leading-relaxed scrollbar-hide italic border border-white/5 select-all">
                                        {fullScreenItem.content}
                                    </div>
                                    <button 
                                        onClick={() => {
                                            const el = document.createElement('textarea'); 
                                            el.value = fullScreenItem.content; 
                                            document.body.appendChild(el); 
                                            el.select(); 
                                            document.execCommand('copy'); 
                                            document.body.removeChild(el);
                                            showToast("복사되었습니다.");
                                        }} 
                                        className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-transform"
                                    >
                                        프롬프트 복사
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Auth Modal */}
                    {isAdminAuthModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-sm" onClick={() => setIsAdminAuthModalOpen(false)}></div>
                            <div className="relative bg-white w-full max-w-sm rounded-[40px] shadow-2xl p-8 sm:p-10 text-center zoom-in">
                                <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-sm">
                                    <Icon name="lock" size={32} />
                                </div>
                                <h2 className="text-xl sm:text-2xl font-black text-slate-800 mb-6">관리자 인증</h2>
                                <form onSubmit={handleAdminAuth} className="space-y-4">
                                    <input 
                                        type="password" 
                                        placeholder="비밀번호 입력" 
                                        className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none font-bold text-center tracking-widest focus:ring-4 focus:ring-indigo-500/10 transition-all" 
                                        value={adminInput} 
                                        onChange={e => setAdminInput(e.target.value)} 
                                        autoFocus 
                                        required 
                                    />
                                    <button type="submit" className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">확인</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Registration Modal (Admin Only) */}
                    {isModalOpen && isAdmin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="relative bg-white w-full max-w-md rounded-[48px] shadow-2xl p-8 sm:p-10 zoom-in">
                                <h2 className="text-xl sm:text-2xl font-black text-slate-800 mb-8 flex items-center gap-2">
                                    <Icon name="folder-plus" className="text-indigo-600" /> 신규 등록
                                </h2>
                                <form onSubmit={registerPrompt} className="space-y-6 max-h-[70vh] overflow-y-auto no-scrollbar pr-1">
                                    <div className="space-y-4">
                                        <input type="text" placeholder="제목" className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none font-bold text-sm focus:ring-2 focus:ring-indigo-500/10" value={newPrompt.title} onChange={e => setNewPrompt({...newPrompt, title: e.target.value})} required />
                                        <div className="flex gap-2">
                                            <select className="flex-1 px-6 py-4 bg-slate-50 border-none rounded-2xl text-sm font-bold outline-none appearance-none" value={newPrompt.category} onChange={e => setNewPrompt({...newPrompt, category: e.target.value})}>
                                                {categories.filter(c => c !== "전체").map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                            </select>
                                            <button type="button" onClick={() => setIsAddingNewCategory(true)} className="w-14 h-13 bg-indigo-50 rounded-2xl text-indigo-600 flex items-center justify-center hover:bg-indigo-100 transition-colors">
                                                <Icon name="plus" size={24} />
                                            </button>
                                        </div>
                                        {isAddingNewCategory && (
                                            <div className="flex gap-2 animate-in slide-in-from-right-4">
                                                <input type="text" placeholder="분류명" className="flex-1 px-6 py-4 bg-indigo-50/20 border-none rounded-2xl outline-none font-bold text-sm" value={tempCategory} onChange={e => setTempCategory(e.target.value)} autoFocus />
                                                <button onClick={() => {
                                                    if (tempCategory.trim()) {
                                                        setCategories([...categories, tempCategory.trim()]);
                                                        setNewPrompt({...newPrompt, category: tempCategory.trim()});
                                                        setTempCategory(""); setIsAddingNewCategory(false);
                                                    }
                                                }} type="button" className="px-5 bg-indigo-600 text-white rounded-2xl font-black text-xs">추가</button>
                                            </div>
                                        )}
                                        <div 
                                            onClick={() => fileInputRef.current?.click()} 
                                            className="cursor-pointer aspect-video rounded-[32px] border-2 border-dashed flex flex-col items-center justify-center transition-all bg-slate-50 hover:bg-slate-100 hover:border-indigo-200 overflow-hidden"
                                        >
                                            {newPrompt.imageData ? (
                                                <img src={newPrompt.imageData} className="w-full h-full object-cover" />
                                            ) : (
                                                <div className="text-center">
                                                    <Icon name="upload" size={32} className="text-slate-200 mb-2 mx-auto" />
                                                    <p className="text-[10px] font-black text-slate-400">IMAGE UPLOAD</p>
                                                </div>
                                            )}
                                        </div>
                                        <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={(e) => {
                                            const f = e.target.files[0];
                                            if (f) {
                                                const r = new FileReader(); 
                                                r.onloadend = () => {
                                                    if (r.result.length > 1000000) showToast("이미지가 너무 큽니다 (1MB 이하 권장)", "error");
                                                    else setNewPrompt({...newPrompt, imageData: r.result});
                                                };
                                                r.readAsDataURL(f);
                                            }
                                        }} />
                                        <textarea rows="4" placeholder="AI 프롬프트 붙여넣기" className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none text-sm font-medium resize-none focus:ring-2 focus:ring-indigo-500/10" value={newPrompt.content} onChange={e => setNewPrompt({...newPrompt, content: e.target.value})} required />
                                    </div>
                                    <button type="submit" className="w-full py-5 bg-indigo-600 text-white rounded-[28px] font-black text-lg shadow-2xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">클라우드 서버에 등록</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Delete Modal */}
                    {isDeleteModalOpen && isAdmin && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onClick={() => setIsDeleteModalOpen(null)}></div>
                            <div className="relative bg-white w-full max-w-sm rounded-[48px] p-10 sm:p-12 text-center shadow-2xl zoom-in">
                                <div className="w-16 h-16 bg-rose-50 text-rose-500 rounded-3xl flex items-center justify-center mx-auto mb-6">
                                    <Icon name="trash-2" size={32} />
                                </div>
                                <h3 className="font-black text-slate-800 text-xl sm:text-2xl mb-8 leading-tight">이 프롬프트를<br/>삭제할까요?</h3>
                                <div className="flex gap-3">
                                    <button onClick={() => setIsDeleteModalOpen(null)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-400 hover:bg-slate-200">취소</button>
                                    <button onClick={async () => {
                                        try {
                                            const path = `artifacts/${appId}/public/data/prompts`;
                                            await db.collection(path).doc(isDeleteModalOpen).delete();
                                            setIsDeleteModalOpen(null); 
                                            showToast("삭제되었습니다.");
                                        } catch(e) {
                                            showToast("삭제 권한이 없습니다", "error");
                                        }
                                    }} className="flex-1 py-4 bg-rose-500 text-white rounded-2xl font-black shadow-lg shadow-rose-100">삭제</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast && (
                        <div className={`fixed bottom-12 left-1/2 -translate-x-1/2 z-[200] px-8 py-4 rounded-full shadow-2xl text-white text-[12px] font-black flex items-center gap-3 bg-slate-900/95 animate-in slide-in-from-bottom-4`}>
                            <Icon name={toast.type === 'error' ? "alert-circle" : "check"} size={16} />
                            {toast.text}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
